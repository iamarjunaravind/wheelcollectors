<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | WHEEL COLLECTORS | Hot Wheels Collector Shop</title>
    <meta name="description" content="WheelCollectors is your premium destination for diecast toy cars and collectible scaled models in India. Explore our exclusive collection of Hot Wheels and more.">
    <!-- Google Search Console Verification Placeholder -->
    <!-- <meta name="google-site-verification" content="PASTE_YOUR_CODE_HERE" /> -->
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="header-container"></div>

    <main>
        <section class="hero">
            <div class="container">
                <div class="row" style="display: flex; gap: 30px;">
                    <div class="col-lg-3" style="width: 25%;">
                        <div class="hero-sidebar">
                            <div class="hero-sidebar-title">
                                <i class="fa fa-bars"></i>
                                <span>All Categories</span>
                            </div>
                            <ul id="hero-category-list">
                                <!-- Loaded via JS -->
                            </ul>
                        </div>
                    </div>
                    <div class="col-lg-9" style="width: 75%;">
                        <div class="hero-search" style="display: flex; align-items: center; gap: 30px;">
                            <div class="hero-search-form" style="flex: 1;">
                                <form action="shop.html" method="GET" style="display: flex; width: 100%;">
                                    <input type="text" name="search" placeholder="What model do you need?" style="flex: 1; border: 1px solid #ebebeb; padding: 0 20px; font-size: 16px; outline: none; height: 50px;">
                                    <button type="submit" class="site-btn" style="background: var(--primary); color: white; border: none; padding: 0 30px; font-weight: 700; text-transform: uppercase; cursor: pointer;">SEARCH</button>
                                </form>
                            </div>
                            <div class="hero-search-phone" style="display: flex; align-items: center; gap: 15px;">
                                <div class="hero-search-phone-icon" style="width: 50px; height: 50px; background: #f5f5f5; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 18px;">
                                    <i class="fa-solid fa-phone"></i>
                                </div>
                                <div class="hero-search-phone-text">
                                    <h5 style="font-size: 18px; color: #1c1c1c; font-weight: 700; margin-bottom: 0;">+91 77361 28087</h5>
                                    <span style="font-size: 12px; color: var(--text-muted);">support 24/7 time</span>
                                </div>
                            </div>
                        </div>
                        <div class="hero-slider" id="hero-slider">
                            <!-- Loaded via JS -->
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="mobile-category-selector">
            <div class="category-scroll-container" id="mobile-category-list">
                <!-- Loaded via JS -->
            </div>
        </section>

        <div id="category-showcases">
            <!-- Loaded via JS -->
        </div>

        <section class="section featured-products">
            <div class="container">
                <div class="section-header" style="margin-bottom: 20px; text-align: left;">
                    <h2 class="section-title">Featured Collections</h2>
                    <span style="color: var(--primary); font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 2px;">Premium Selection</span>
                </div>
                <div class="products-grid" id="featured-slider">
                    <!-- Featured products > 250 loaded here -->
                </div>
            </div>
        </section>

    </main>

    <div id="footer-container"></div>

    <script src="js/main.js"></script>
    <script>
        async function loadHomeData() {
            console.log('Fetching home data from:', apiBase);
            
            // 1. Load Hero Slider (Highest Priority)
            try {
                const heroRes = await fetch(`${apiBase}/products?limit=50`);
                const allProducts = await heroRes.json();
                
                // Get Premium IDs
                const premiumProducts = allProducts.filter(p => Number(p.price) > 250).slice(0, 8);
                
                if (premiumProducts.length > 0) {
                    // Fetch full details (with all images) for each premium product in parallel
                    const detailsPromises = premiumProducts.map(p => fetch(`${apiBase}/products/${p.id}`).then(res => res.json()));
                    const fullProducts = await Promise.all(detailsPromises);
                    
                    // Create slides for ALL images of these products
                    let slideChoices = [];
                    fullProducts.forEach(p => {
                        const productImages = (p.images && p.images.length > 0) 
                            ? p.images.map(img => img.image_path)
                            : [p.image_url];
                        
                        productImages.forEach(imgUrl => {
                            slideChoices.push({ img: imgUrl, name: p.name, subtitle: p.subtitle, id: p.id });
                        });
                    });

                    // Randomize the slide order
                    slideChoices.sort(() => Math.random() - 0.5);

                    const slider = document.getElementById('hero-slider');
                    slider.innerHTML = slideChoices.map((s, idx) => `
                        <div class="hero-slide ${idx === 0 ? 'active' : ''}" style="background-image: url('${s.img}');">
                            <div class="hero-banner-text">
                                <span style="background: var(--accent); color: #000; font-weight: 800;">PREMIUM COLLECTION</span>
                                <h2>${s.name.toUpperCase()}</h2>
                                <p>${s.subtitle || 'Experience the pinnacle of precision engineering.'}</p>
                                <a href="product-details.html?id=${s.id}" class="btn btn-primary" style="padding: 15px 40px; font-size: 16px;"><span>EXPLORE MODEL</span></a>
                            </div>
                        </div>
                    `).join('');

                    // 1b. Load-Sync Auto-Slide Logic
                    let currentSlide = 0;
                    const slides = document.querySelectorAll('.hero-slide');
                    
                    if (slides.length > 1) {
                        const transitionSlide = () => {
                            const nextSlideIndex = (currentSlide + 1) % slides.length;
                            const nextSlide = slides[nextSlideIndex];
                            
                            // Extract image URL from style
                            const imgUrl = nextSlide.style.backgroundImage.slice(5, -2);
                            
                            // PRELOAD: Only switch once the next image is ready
                            const img = new Image();
                            img.src = imgUrl;
                            img.onload = () => {
                                slides[currentSlide].classList.remove('active');
                                currentSlide = nextSlideIndex;
                                slides[currentSlide].classList.add('active');
                                setTimeout(transitionSlide, 5000); // Wait 5s then queue next
                            };
                            img.onerror = () => {
                                // If load fails, skip to next immediately
                                currentSlide = nextSlideIndex;
                                transitionSlide();
                            };
                        };
                        
                        // Start the cycle
                        setTimeout(transitionSlide, 5000);
                    }
                } else {
                    const slider = document.getElementById('hero-slider');
                    slider.innerHTML = `<div class="hero-slide active" style="background: linear-gradient(135deg, #0f172a, #1e293b);"><div class="hero-banner-text"><h2>THE VAULT</h2><p>Exclusive 1:64 scale machines.</p></div></div>`;
                }
            } catch (err) { console.error('Error loading hero slider:', err); }

            // 2. Load Categories (Sidebar + Mobile Selector)
            try {
                const catRes = await fetch(`${apiBase}/categories`);
                let categories = await catRes.json();
                
                // Sidebar order (original)
                const catList = document.getElementById('hero-category-list');
                catList.innerHTML = categories.slice(0, 11).map(cat => 
                    `<li><a href="shop.html?category=${cat.id}">${cat.name}</a></li>`
                ).join('');

                // Mobile Horizontal Selector
                const mobileCatList = document.getElementById('mobile-category-list');
                if (mobileCatList) {
                    mobileCatList.innerHTML = categories.map(cat => `
                        <a href="shop.html?category=${cat.id}" class="mobile-cat-item">
                            <div class="cat-icon-circle">
                                <img src="${cat.image_url || 'assets/images/placeholder.png'}" alt="${cat.name}">
                            </div>
                            <span>${cat.name}</span>
                        </a>
                    `).join('');
                }

                // 3. Reorder for Showcase: Move "HOT WHEELS DIE CAST" to the end
                const hotWheelsIdx = categories.findIndex(c => c.name.toUpperCase().includes('HOT WHEELS'));
                if (hotWheelsIdx !== -1) {
                    const hotWheels = categories.splice(hotWheelsIdx, 1)[0];
                    categories.push(hotWheels);
                }

                // 4. Load Showcase Categories
                const showcaseContainer = document.getElementById('category-showcases');
                showcaseContainer.innerHTML = ''; // Clear and sequential load
                
                for (const cat of categories) {
                    const prodRes = await fetch(`${apiBase}/products?category=${cat.id}&limit=8`);
                    const products = await prodRes.json();
                    
                    showcaseContainer.innerHTML += `
                        <div class="container" style="margin-top: 10px;">
                            <a href="shop.html?category=${cat.id}" class="category-banner-card">
                                <img src="${cat.image_url || 'assets/images/placeholder.png'}" alt="${cat.name}">
                                <div class="category-banner-overlay">
                                    <p style="text-transform: uppercase; letter-spacing: 3px; color: var(--primary); font-weight: 700; margin-bottom: 5px;">Premium Collection</p>
                                    <h2>${cat.name}</h2>
                                    <p>Discover the finest precision models in the ${cat.name} series.</p>
                                </div>
                            </a>
                        </div>
                        ${products.length > 0 ? `
                        <section class="section category-showcase" style="padding-top: 40px !important;">
                            <div class="container">
                                <div class="section-header" style="display: flex; justify-content: space-between; align-items: baseline;">
                                    <h2 class="section-title">${cat.name} Highlights</h2>
                                    <a href="shop.html?category=${cat.id}" class="view-all">View Full Series <i class="fa fa-arrow-right"></i></a>
                                </div>
                                <div class="products-grid">
                                    ${products.map(p => createProductCard(p)).join('')}
                                </div>
                            </div>
                        </section>` : `
                        <div class="container" style="padding: 40px 0; text-align: center; color: var(--text-muted); font-style: italic;">
                            More ${cat.name} models arriving soon. Stay tuned!
                        </div>`}
                    `;
                }
            } catch (err) { console.error('Error loading categories:', err); }

            // 5. Featured Collections Footer (> 250)
            try {
                const featRes = await fetch(`${apiBase}/products?limit=100`); // Fetch 100 for better premium coverage
                const allProds = await featRes.json();
                const premiumFeatured = allProds.filter(p => Number(p.price) > 250).slice(0, 12);
                
                const featSlider = document.getElementById('featured-slider');
                if (featSlider) {
                    featSlider.innerHTML = premiumFeatured.map(p => createProductCard(p, true)).join('');
                }
            } catch (err) { console.error('Error loading featured products:', err); }
        }

        loadHomeData();
    </script>
</body>
</html>
