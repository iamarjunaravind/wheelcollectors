<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | WHEEL COLLECTORS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="header-container"></div>

    <main class="section">
        <div class="container">
            <div class="product-details-grid" id="product-details-container">
                <!-- Loaded via JS -->
            </div>

            <!-- Related Products -->
            <div style="margin-top: 100px;">
                <h2 class="section-title">Related Toy Cars</h2>
                <div class="products-grid" id="related-grid">
                    <!-- Loaded via JS -->
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script src="js/main.js"></script>
    <script>
        function showAllThumbnails() {
            const grid = document.getElementById('thumbnail-grid');
            if (!grid || !window.currentProductImages) return;
            
            grid.innerHTML = window.currentProductImages.map(img => `
                <div class="thumbnail" onclick="document.getElementById('main-product-image').src='${img.image_path}'" style="aspect-ratio: 1/1; background: #ffffff; border-radius: 8px; border: 1px solid #f2f2f2; cursor: pointer; overflow: hidden; display: flex; align-items: center; justify-content: center;">
                    <img src="${img.image_path}" style="width:100%; height:100%; object-fit:contain;">
                </div>
            `).join('');
            grid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(70px, 1fr))';
        }

        async function loadProductDetails() {
            // Using global apiBase from main.js
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) { window.location.href = 'shop.html'; return; }

            try {
                const res = await fetch(`${apiBase}/products/${id}`);
                if (!res.ok) throw new Error('Product not found');
                const p = await res.json();

                document.title = `${p.name} - Details | WHEEL COLLECTORS`;

                const container = document.getElementById('product-details-container');
                container.innerHTML = `
                    <div class="product-gallery">
                        <div class="product-gallery-main">
                            ${p.badge ? `<div class="product-badge">${p.badge}</div>` : ''}
                            <img id="main-product-image" src="${p.images && p.images.length > 0 ? p.images[0].image_path : p.image_url}" alt="${p.name}">
                        </div>
                        ${p.images && p.images.length > 1 ? `
                        <div class="product-thumbnails" id="thumbnail-grid" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 0px;">
                            ${p.images.slice(0, 4).map(img => `
                                <div class="thumbnail" onclick="document.getElementById('main-product-image').src='${img.image_path}'" style="aspect-ratio: 1/1; background: #ffffff; border-radius: 8px; border: 1px solid #f2f2f2; cursor: pointer; overflow: hidden; display: flex; align-items: center; justify-content: center;">
                                    <img src="${img.image_path}" style="width:100%; height:100%; object-fit:contain;">
                                </div>
                            `).join('')}
                            ${p.images.length > 5 ? `
                                <div class="thumbnail more-thumbs" onclick="showAllThumbnails()" style="aspect-ratio: 1/1; background: #f1f5f9; border-radius: 8px; border: 1px solid #e2e8f0; cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative;">
                                    <img src="${p.images[4].image_path}" style="width:100%; height:100%; object-fit:contain; opacity: 0.3;">
                                    <div style="position: absolute; font-weight: 700; color: #1e293b; font-size: 1.2rem;">+${p.images.length - 4}</div>
                                </div>
                            ` : (p.images.length === 5 ? `
                                <div class="thumbnail" onclick="document.getElementById('main-product-image').src='${p.images[4].image_path}'" style="aspect-ratio: 1/1; background: #ffffff; border-radius: 8px; border: 1px solid #f2f2f2; cursor: pointer; overflow: hidden; display: flex; align-items: center; justify-content: center;">
                                    <img src="${p.images[4].image_path}" style="width:100%; height:100%; object-fit:contain;">
                                </div>
                            ` : '')}
                        </div>` : ''}
                    </div>

                    <div class="product-details-content">
                        <span style="color: var(--primary); font-weight: 700; text-transform: uppercase; letter-spacing: 2px;">Series Model</span>
                        <h1>${p.name} <small style="display: block; color: #666; font-weight: 400; margin-top: 5px;">${p.subtitle || ''}</small></h1>
                        
                        <div class="rating" style="font-size: 1rem; margin-bottom: 20px; color: #edbb0e;">
                            ${Array(Math.floor(p.rating || 0)).fill('<i class="fa-solid fa-star"></i>').join('')}
                            ${(p.rating % 1) >= 0.5 ? '<i class="fa-solid fa-star-half-stroke"></i>' : ''}
                            <span style="color: #666; margin-left:10px;">(${p.review_count || 0} Reviews)</span>
                        </div>

                        ${Number(p.stock) > 0 && Number(p.stock) < 5 ? `
                        <div class="stock-warning" style="background: rgba(244, 63, 94, 0.1); border-left: 4px solid var(--primary); padding: 12px 20px; border-radius: 8px; margin-bottom: 25px; display: flex; align-items: center; gap: 12px;">
                            <span style="font-size: 1.2rem;">🔥</span>
                            <div style="font-weight: 700; color: #1e293b; font-size: 0.9rem; font-family: 'Outfit', sans-serif;">
                                Only ${p.stock} stock available. <span style="color: var(--primary);">Order now!</span>
                            </div>
                        </div>
                        ` : ''}

                        <div class="stock-status" style="font-size: 0.9rem; margin-bottom: 25px; font-weight: 600; font-family: 'Outfit', sans-serif; display: flex; align-items: center; gap: 8px;">
                            ${Number(p.stock) === 0 ? 
                                `<span style="background: var(--primary); color: white; padding: 4px 12px; border-radius: 4px; font-size: 0.8rem; font-weight: 800;">SOLD OUT</span>` : 
                                `<span style="color: #666; display: flex; align-items: center; gap: 5px;">
                                    <i class="fa-solid fa-circle-check"></i> IN STOCK: ${p.stock} Units Available
                                </span>`
                            }
                        </div>

                        <div style="display: flex; gap: 15px; margin-bottom: 30px;">
                            ${Number(p.stock) > 0 ? `
                            <div style="width: 120px; display: flex; align-items: center; border: 1px solid #ebebeb; border-radius: 4px; overflow: hidden;">
                                <button type="button" onclick="const input = document.getElementById('qty-input'); if(input.value > 1) input.value--" style="flex: 1; background: #f5f5f5; border: none; padding: 10px; cursor: pointer;">-</button>
                                <input type="number" id="qty-input" value="1" min="1" max="${p.stock}" style="width: 40px; text-align: center; border: none; font-weight: 700;">
                                <button type="button" onclick="const input = document.getElementById('qty-input'); if(input.value < ${p.stock}) input.value++" style="flex: 1; background: #f5f5f5; border: none; padding: 10px; cursor: pointer;">+</button>
                            </div>
                            <button class="site-btn" onclick="addToCart(null, ${p.id}, document.getElementById('qty-input').value)" style="flex: 1; background: var(--primary); color: white; border: none; font-weight: 700; text-transform: uppercase; cursor: pointer; padding: 0 30px;">ADD TO CART</button>
                            ` : `
                            <button class="site-btn" disabled style="flex: 1; background: #e2e8f0; color: #94a3b8; border: none; font-weight: 700; text-transform: uppercase; cursor: not-allowed; padding: 0 30px;">OUT OF STOCK</button>
                            `}
                        </div>

                        <p style="margin-bottom: 40px;">${p.description || 'No description available.'}</p>

                        <div style="border-top: 1px solid #ebebeb; padding-top: 30px;">
                            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 10px;">
                                <i class="fa-solid fa-truck-fast" style="color: var(--primary);"></i>
                                <span style="font-size: 14px; font-weight: 600;">Free Shipping for Collector Orders</span>
                            </div>
                            <div style="display: flex; align-items: center; gap: 15px;">
                                <i class="fa-solid fa-shield-check" style="color: var(--primary);"></i>
                                <span style="font-size: 14px; font-weight: 600;">Authenticity Guaranteed</span>
                            </div>
                        </div>
                    </div>`;

                // Store for gallery expansion
                window.currentProductImages = p.images;

                // Load Related Products
                const relatedRes = await fetch(`${apiBase}/products?category=${p.category_id}&limit=4`);
                const related = await relatedRes.json();
                document.getElementById('related-grid').innerHTML = related
                    .filter(rp => rp.id !== p.id)
                    .map(rp => createProductCard(rp)).join('');

            } catch (err) {
                console.error('Error loading product details:', err);
                document.getElementById('product-details-container').innerHTML = '<p>Product not found.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadProductDetails);
    </script>
</body>
</html>
