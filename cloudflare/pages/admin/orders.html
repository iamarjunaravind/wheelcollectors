<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Orders | WHEEL COLLECTORS</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --premium-bg: #0f172a;
            --premium-surface: #1e293b;
            --premium-primary: #6366f1;
            --premium-text: #f8fafc;
            --premium-text-muted: #94a3b8;
            --premium-border: rgba(255, 255, 255, 0.1);
        }
        body { background: var(--premium-bg); color: var(--premium-text); min-height: 100vh; display: flex; }
        .admin-sidebar { width: 280px; background: #1e293b; border-right: 1px solid var(--premium-border); padding: 30px 20px; display: flex; flex-direction: column; position: fixed; height: 100vh; }
        .admin-nav a { color: var(--premium-text-muted); text-decoration: none; padding: 14px 18px; border-radius: 12px; display: flex; align-items: center; gap: 12px; transition: 0.3s; font-weight: 500; }
        .admin-nav a:hover, .admin-nav a.active { color: white; background: rgba(255,255,255,0.05); }
        .admin-nav a.active { color: var(--premium-primary); border-left: 3px solid var(--premium-primary); border-radius: 0 12px 12px 0; }
        .admin-main { flex: 1; margin-left: 280px; padding: 40px; }
        .admin-card { background: var(--premium-surface); border-radius: 20px; border: 1px solid var(--premium-border); overflow: hidden; margin-bottom: 30px; }
        .admin-card-header { padding: 20px 30px; border-bottom: 1px solid var(--premium-border); }
        .admin-table { width: 100%; border-collapse: collapse; }
        .admin-table th { text-align: left; padding: 15px 30px; background: rgba(0,0,0,0.2); color: var(--premium-text-muted); font-size: 0.8rem; text-transform: uppercase; }
        .admin-table td { padding: 15px 30px; border-bottom: 1px solid var(--premium-border); }
        .badge { padding: 5px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; }
        .badge-pending { background: rgba(245,158,11,0.1); color: #f59e0b; }
        .badge-completed { background: rgba(16,185,129,0.1); color: #10b981; }
    </style>
</head>
<body>
    <div class="admin-main">
        <header style="margin-bottom: 40px;">
            <h2>Order History</h2>
        </header>

        <div class="admin-card">
            <div class="admin-card-header">
                <h3>Recent Transactions</h3>
            </div>
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>User ID</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th style="text-align: right;">Action</th>
                    </tr>
                </thead>
                <tbody id="orders-table-body">
                    <tr><td colspan="5" style="text-align: center; padding: 40px;">No orders available to fetch from D1 yet.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/admin.js"></script>
    <script>
        async function loadOrders() {
            const tableBody = document.getElementById('orders-table-body');
            try {
                tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 40px;"><i class="fas fa-spinner fa-spin"></i> Fetching orders...</td></tr>`;
                
                const res = await fetch(`${apiBase}/admin/orders`, {
                    headers: getAuthHeaders()
                });
                const orders = await res.json();

                if (!orders || orders.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 40px;">No orders found yet.</td></tr>`;
                    return;
                }

                tableBody.innerHTML = '';
                orders.forEach(order => {
                    const date = new Date(order.created_at).toLocaleDateString('en-IN', {
                        day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
                    });
                    
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td style="font-weight: 600;">#${order.id}</td>
                        <td>
                            <div style="font-weight: 600;">${order.customer_name || 'Guest'}</div>
                            <div style="font-size: 0.75rem; color: var(--premium-text-muted);">${order.customer_email || 'No email'}</div>
                            <div style="font-size: 0.75rem; color: var(--premium-text-muted);">${order.customer_phone || ''}</div>
                        </td>
                        <td>
                             <div style="font-weight: 600; color: var(--premium-primary);">₹ ${order.total_price.toLocaleString()}</div>
                             <div style="font-size: 0.7rem; color: var(--premium-text-muted);">${order.items?.length || 0} items</div>
                        </td>
                        <td>
                            <span class="badge ${order.status === 'Paid' ? 'badge-completed' : 'badge-pending'}">${order.status || 'Pending'}</span>
                            <div style="font-size: 0.7rem; color: var(--premium-text-muted); margin-top: 4px;">${date}</div>
                        </td>
                        <td style="text-align: right;">
                            <button onclick="viewDetails(${order.id})" class="btn-view" style="background: rgba(99, 102, 241, 0.1); border: 1px solid var(--premium-primary); color: var(--premium-primary); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; transition: 0.3s; font-weight: 500;">
                                <i class="fas fa-eye"></i> Details
                            </button>
                        </td>
                    `;
                    tableBody.appendChild(row);

                    // Details row (hidden by default)
                    const detailsRow = document.createElement('tr');
                    detailsRow.id = `details-${order.id}`;
                    detailsRow.style.display = 'none';
                    detailsRow.innerHTML = `
                        <td colspan="5" style="background: rgba(0,0,0,0.1); padding: 25px 40px;">
                            <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 40px;">
                                <div>
                                    <h4 style="margin-bottom: 15px; color: var(--premium-primary); font-size: 0.9rem; text-transform: uppercase;">Shipping Content</h4>
                                    <p style="font-size: 0.9rem; line-height: 1.6; color: var(--premium-text-muted);">
                                        <strong>State:</strong> ${order.state || 'N/A'}<br>
                                        <strong>Address:</strong> ${order.address || (order.city ? `${order.city} - ${order.pincode}` : 'No address provided')}
                                    </p>
                                    <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05);">
                                        <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 5px;">
                                            <span>Subtotal:</span>
                                            <span>₹ ${(order.total_price - (order.shipping_cost || 0)).toLocaleString()}</span>
                                        </div>
                                        <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 5px;">
                                            <span>Shipping:</span>
                                            <span>₹ ${(order.shipping_cost || 0).toLocaleString()}</span>
                                        </div>
                                        <div style="display: flex; justify-content: space-between; font-weight: 700; font-size: 1rem; color: var(--premium-primary); margin-top: 10px;">
                                            <span>Total Paid:</span>
                                            <span>₹ ${order.total_price.toLocaleString()}</span>
                                        </div>
                                    </div>
                                </div>
                                <div>
                                    <h4 style="margin-bottom: 15px; color: var(--premium-primary); font-size: 0.9rem; text-transform: uppercase;">Ordered Items</h4>
                                    <div style="display: flex; flex-direction: column; gap: 12px;">
                                        ${(order.items || []).map(item => `
                                            <div style="display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px;">
                                                <img src="../${item.image_url}" style="width: 40px; height: 40px; border-radius: 6px; object-fit: cover;">
                                                <div style="flex: 1;">
                                                    <div style="font-weight: 500; font-size: 0.85rem;">${item.product_name}</div>
                                                    <div style="font-size: 0.75rem; color: var(--premium-text-muted);">Qty: ${item.quantity} × ₹ ${item.price}</div>
                                                </div>
                                                <div style="font-weight: 600;">₹ ${item.quantity * item.price}</div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>
                        </td>
                    `;
                    tableBody.appendChild(detailsRow);
                });
            } catch (err) {
                console.error('Error loading orders:', err);
                tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #ef4444; padding: 40px;">Failed to load orders. Please check console.</td></tr>`;
            }
        }

        function viewDetails(orderId) {
            const el = document.getElementById(`details-${orderId}`);
            const isHidden = el.style.display === 'none';
            // Hide all first
            document.querySelectorAll('[id^="details-"]').forEach(d => d.style.display = 'none');
            // Toggle
            el.style.display = isHidden ? 'table-row' : 'none';
        }

        document.addEventListener('DOMContentLoaded', loadOrders);
    </script>
</body>
</html>
