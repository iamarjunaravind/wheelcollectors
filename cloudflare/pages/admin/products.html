<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products | WHEEL COLLECTORS</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --premium-bg: #0f172a;
            --premium-surface: #1e293b;
            --premium-primary: #6366f1;
            --premium-text: #f8fafc;
            --premium-text-muted: #94a3b8;
            --premium-border: rgba(255, 255, 255, 0.1);
            --premium-accent: #f43f5e;
        }
        body { background: var(--premium-bg); color: var(--premium-text); min-height: 100vh; display: flex; }
        .admin-sidebar { width: 280px; background: #1e293b; border-right: 1px solid var(--premium-border); padding: 30px 20px; display: flex; flex-direction: column; position: fixed; height: 100vh; }
        .admin-nav a { color: var(--premium-text-muted); text-decoration: none; padding: 14px 18px; border-radius: 12px; display: flex; align-items: center; gap: 12px; transition: 0.3s; font-weight: 500; }
        .admin-nav a:hover, .admin-nav a.active { color: white; background: rgba(255,255,255,0.05); }
        .admin-nav a.active { color: var(--premium-primary); border-left: 3px solid var(--premium-primary); border-radius: 0 12px 12px 0; }
        .admin-main { flex: 1; margin-left: 280px; padding: 40px; width: calc(100% - 280px); }
        .admin-card { background: var(--premium-surface); border-radius: 20px; border: 1px solid var(--premium-border); overflow: hidden; margin-bottom: 30px; }
        .admin-card-header { padding: 20px 30px; border-bottom: 1px solid var(--premium-border); display: flex; justify-content: space-between; align-items: center; }
        .admin-table { width: 100%; border-collapse: collapse; }
        .admin-table th { text-align: left; padding: 15px 30px; background: rgba(0,0,0,0.2); color: var(--premium-text-muted); font-size: 0.8rem; text-transform: uppercase; }
        .admin-table td { padding: 15px 30px; border-bottom: 1px solid var(--premium-border); }
        .btn-sm { padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
        
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-content {
            background: var(--premium-surface);
            width: 100%;
            max-width: 600px;
            border-radius: 24px;
            border: 1px solid var(--premium-border);
            padding: 40px;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.8rem; color: var(--premium-text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--premium-border);
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
        }
        .form-group input:focus { border-color: var(--premium-primary); }
    </style>
</head>
<body>
    <div class="admin-main">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
            <h2>Inventory Management</h2>
            <button class="btn btn-primary" onclick="showAddModal()">+ Add Product</button>
        </header>

        <div class="admin-card">
            <div class="admin-card-header">
                <h3>Product List</h3>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="search-box" placeholder="Search..." oninput="filterProducts()" style="background: rgba(255,255,255,0.05); border: 1px solid var(--premium-border); padding: 8px 15px; border-radius: 10px; color: white;">
                </div>
            </div>
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Product</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Category</th>
                        <th style="text-align: right;">Actions</th>
                    </tr>
                </thead>
                <tbody id="products-table-body">
                    <tr><td colspan="6" style="text-align: center; padding: 50px;">Loading inventory...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="product-modal">
        <div class="modal-content">
            <h3 id="modal-title" style="margin-bottom: 25px;">Add New Product</h3>
            <form id="product-form">
                <input type="hidden" id="p-id">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Category</label>
                        <select id="p-category" required></select>
                    </div>
                    <div class="form-group">
                        <label>Price (₹)</label>
                        <input type="number" id="p-price" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="p-name" required>
                </div>
                <div class="form-group">
                    <label>Subtitle / Model</label>
                    <input type="text" id="p-subtitle">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Stock Quantity</label>
                        <input type="number" id="p-stock" value="0">
                    </div>
                    <div class="form-group">
                        <label>Badge</label>
                        <input type="text" id="p-badge" placeholder="NEW, RARE, etc.">
                    </div>
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="text" id="p-image" placeholder="assets/images/products/example.jpg">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="p-description" rows="3"></textarea>
                </div>
                <div style="display: flex; gap: 15px; margin-top: 20px;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Save Product</button>
                    <button type="button" class="btn" style="background: rgba(255,255,255,0.05); color: white;" onclick="hideModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/admin.js"></script>
    <script>
        let allProducts = [];

        async function loadCategories() {
            try {
                const res = await fetch(`${apiBase}/categories`);
                const categories = await res.json();
                const select = document.getElementById('p-category');
                select.innerHTML = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            } catch (err) { console.error('Error loading categories:', err); }
        }

        async function loadProducts() {
            try {
                const res = await fetch(`${apiBase}/admin/products`, { headers: getAuthHeaders() });
                allProducts = await res.json();
                renderProducts(allProducts);
            } catch (err) {
                console.error('Error loading products:', err);
                document.getElementById('products-table-body').innerHTML = `<tr><td colspan="6" style="text-align: center; color: var(--premium-accent);">Error loading products</td></tr>`;
            }
        }

        function renderProducts(products) {
            const tbody = document.getElementById('products-table-body');
            tbody.innerHTML = products.map(p => `
                <tr>
                    <td style="color: var(--premium-text-muted);">#${p.id}</td>
                    <td>
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <img src="../${p.image_url}" style="width: 40px; height: 40px; object-fit: contain; border-radius: 6px; background: white; padding: 2px;">
                            <div>
                                <div style="font-weight: 600;">${p.name}</div>
                                <div style="font-size: 0.75rem; color: var(--premium-text-muted);">${p.subtitle || ''}</div>
                            </div>
                        </div>
                    </td>
                    <td style="font-weight: 700;">₹ ${p.price}</td>
                    <td>
                        <span style="font-weight: 600; ${p.stock < 10 ? 'color: var(--premium-accent);' : 'color: #34d399;'}">
                            ${p.stock}
                        </span>
                    </td>
                    <td><span style="background: rgba(99,102,241,0.1); color: var(--premium-primary); padding: 4px 10px; border-radius: 6px; font-size: 0.75rem;">${p.category_id}</span></td>
                    <td style="text-align: right;">
                        <button class="btn btn-sm" onclick="editProduct(${p.id})" style="color: var(--premium-primary); background: rgba(99,102,241,0.05);"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-sm" onclick="deleteProduct(${p.id})" style="color: var(--premium-accent); background: rgba(244,63,94,0.05);"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function filterProducts() {
            const query = document.getElementById('search-box').value.toLowerCase();
            const filtered = allProducts.filter(p => 
                p.name.toLowerCase().includes(query) || 
                (p.subtitle && p.subtitle.toLowerCase().includes(query)) ||
                (p.description && p.description.toLowerCase().includes(query))
            );
            renderProducts(filtered);
        }

        function showAddModal() {
            document.getElementById('modal-title').innerText = 'Add New Product';
            document.getElementById('product-form').reset();
            document.getElementById('p-id').value = '';
            document.getElementById('product-modal').style.display = 'flex';
        }

        function editProduct(id) {
            const p = allProducts.find(prod => prod.id === id);
            if (!p) return;
            
            document.getElementById('modal-title').innerText = 'Edit Product';
            document.getElementById('p-id').value = p.id;
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-subtitle').value = p.subtitle || '';
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-category').value = p.category_id;
            document.getElementById('p-stock').value = p.stock || 0;
            document.getElementById('p-badge').value = p.badge || '';
            document.getElementById('p-image').value = p.image_url || '';
            document.getElementById('p-description').value = p.description || '';
            
            document.getElementById('product-modal').style.display = 'flex';
        }

        function hideModal() {
            document.getElementById('product-modal').style.display = 'none';
        }

        document.getElementById('product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('p-id').value;
            const data = {
                name: document.getElementById('p-name').value,
                subtitle: document.getElementById('p-subtitle').value,
                price: Number(document.getElementById('p-price').value),
                category_id: Number(document.getElementById('p-category').value),
                stock: Number(document.getElementById('p-stock').value),
                badge: document.getElementById('p-badge').value,
                image_url: document.getElementById('p-image').value,
                description: document.getElementById('p-description').value,
                is_featured: 0 // Default
            };

            try {
                const method = id ? 'PATCH' : 'POST';
                const url = id ? `${apiBase}/admin/products/${id}` : `${apiBase}/admin/products`;
                
                const res = await fetch(url, {
                    method,
                    headers: getAuthHeaders(),
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    hideModal();
                    loadProducts();
                } else {
                    const err = await res.json();
                    alert('Error: ' + err.error);
                }
            } catch (err) { console.error('Save error:', err); }
        });

        async function deleteProduct(id) {
            if (!confirm('Are you sure you want to delete this product?')) return;
            try {
                const res = await fetch(`${apiBase}/admin/products/${id}`, {
                    method: 'DELETE',
                    headers: getAuthHeaders()
                });
                if (res.ok) loadProducts();
            } catch (err) { console.error('Delete error:', err); }
        }

        // Initialize
        loadCategories();
        loadProducts();
    </script>
</body>
</html>
