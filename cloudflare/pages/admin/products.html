<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products | WHEEL COLLECTORS</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --premium-bg: #0f172a;
            --premium-surface: #1e293b;
            --premium-primary: #6366f1;
            --premium-text: #f8fafc;
            --premium-text-muted: #94a3b8;
            --premium-border: rgba(255, 255, 255, 0.1);
        }
        body { background: var(--premium-bg); color: var(--premium-text); min-height: 100vh; display: flex; }
        .admin-sidebar { width: 280px; background: #1e293b; border-right: 1px solid var(--premium-border); padding: 30px 20px; display: flex; flex-direction: column; position: fixed; height: 100vh; }
        .admin-nav a { color: var(--premium-text-muted); text-decoration: none; padding: 14px 18px; border-radius: 12px; display: flex; align-items: center; gap: 12px; transition: 0.3s; font-weight: 500; }
        .admin-nav a:hover, .admin-nav a.active { color: white; background: rgba(255,255,255,0.05); }
        .admin-nav a.active { color: var(--premium-primary); border-left: 3px solid var(--premium-primary); border-radius: 0 12px 12px 0; }
        .admin-main { flex: 1; margin-left: 280px; padding: 40px; }
        .admin-card { background: var(--premium-surface); border-radius: 20px; border: 1px solid var(--premium-border); overflow: hidden; margin-bottom: 30px; }
        .admin-card-header { padding: 20px 30px; border-bottom: 1px solid var(--premium-border); display: flex; justify-content: space-between; align-items: center; }
        .admin-table { width: 100%; border-collapse: collapse; }
        .admin-table th { text-align: left; padding: 15px 30px; background: rgba(0,0,0,0.2); color: var(--premium-text-muted); font-size: 0.8rem; text-transform: uppercase; }
        .admin-table td { padding: 15px 30px; border-bottom: 1px solid var(--premium-border); }
        .btn-sm { padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="admin-main">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
            <h2>Inventory Management</h2>
            <button class="btn btn-primary" onclick="showAddModal()">+ Add Product</button>
        </header>

        <div class="admin-card">
            <div class="admin-card-header">
                <h3>Product List</h3>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="search-box" placeholder="Search..." style="background: rgba(255,255,255,0.05); border: 1px solid var(--premium-border); padding: 8px 15px; border-radius: 10px; color: white;">
                </div>
            </div>
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Product</th>
                        <th>Price</th>
                        <th>Category</th>
                        <th style="text-align: right;">Actions</th>
                    </tr>
                </thead>
                <tbody id="products-table-body">
                    <tr><td colspan="5" style="text-align: center; padding: 50px;">Loading inventory...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/admin.js"></script>
    <script>
        async function loadProducts() {
            try {
                const res = await fetch(`${apiBase}/admin/products`, { headers: getAuthHeaders() });
                const products = await res.json();
                
                const tbody = document.getElementById('products-table-body');
                tbody.innerHTML = products.map(p => `
                    <tr>
                        <td style="color: var(--premium-text-muted);">#${p.id}</td>
                        <td>
                            <div style="display: flex; align-items: center; gap: 15px;">
                                <img src="../${p.image_url}" style="width: 40px; height: 40px; object-fit: contain; border-radius: 6px; background: white; padding: 2px;">
                                <div>
                                    <div style="font-weight: 600;">${p.name}</div>
                                    <div style="font-size: 0.75rem; color: var(--premium-text-muted);">${p.subtitle || ''}</div>
                                </div>
                            </div>
                        </td>
                        <td style="font-weight: 700;">₹ ${p.price}</td>
                        <td><span style="background: rgba(99,102,241,0.1); color: var(--premium-primary); padding: 4px 10px; border-radius: 6px; font-size: 0.75rem;">${p.category_id}</span></td>
                        <td style="text-align: right;">
                            <button class="btn btn-sm" onclick="editProduct(${p.id})" style="color: var(--premium-primary); background: rgba(99,102,241,0.05);"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-sm" onclick="deleteProduct(${p.id})" style="color: var(--premium-accent); background: rgba(244,63,94,0.05);"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error('Error loading products:', err);
            }
        }

        async function deleteProduct(id) {
            if (!confirm('Are you sure you want to delete this product?')) return;
            try {
                const res = await fetch(`${apiBase}/admin/products/${id}`, {
                    method: 'DELETE',
                    headers: getAuthHeaders()
                });
                if (res.ok) loadProducts();
            } catch (err) { console.error('Delete error:', err); }
        }

        loadProducts();
    </script>
</body>
</html>
