<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | WHEEL COLLECTORS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="header-container"></div>

    <main class="section">
        <div class="container" style="max-width: 500px; margin: 0 auto;">
            <h2 class="section-title">Create Account</h2>
            <div class="feature-card" style="padding: 40px;">
                <div id="reg-error" style="display: none; color: #ef4444; margin-bottom: 20px; padding: 10px; border-radius: 8px; background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444;"></div>
                <div id="reg-success" style="display: none; color: #10b981; margin-bottom: 20px; padding: 10px; border-radius: 8px; background: rgba(16, 185, 129, 0.1); border: 1px solid #10b981;"></div>

                <form id="reg-form" style="display: flex; flex-direction: column; gap: 20px;">
                    <div style="display: flex; flex-direction: column; gap: 8px;">
                        <label style="font-size: 0.9rem; font-weight: 600; color: var(--text-dark);">Full Name</label>
                        <input type="text" id="reg-name" required style="background: #f5f5f5; border: 1px solid #ddd; padding: 12px; border-radius: 6px; color: #333; font-family: inherit;">
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 8px;">
                        <label style="font-size: 0.9rem; font-weight: 600; color: var(--text-dark);">Email Address</label>
                        <input type="email" id="reg-email" required style="background: #f5f5f5; border: 1px solid #ddd; padding: 12px; border-radius: 6px; color: #333; font-family: inherit;">
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 8px;">
                        <label style="font-size: 0.9rem; font-weight: 600; color: var(--text-dark);">Password</label>
                        <input type="password" id="reg-password" required style="background: #f5f5f5; border: 1px solid #ddd; padding: 12px; border-radius: 6px; color: #333; font-family: inherit;">
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 8px;">
                        <label style="font-size: 0.9rem; font-weight: 600; color: var(--text-dark);">Confirm Password</label>
                        <input type="password" id="reg-confirm-password" required style="background: #f5f5f5; border: 1px solid #ddd; padding: 12px; border-radius: 6px; color: #333; font-family: inherit;">
                    </div>
                    <button type="submit" class="btn btn-primary" id="reg-btn" style="padding: 15px; margin-top: 10px;">Sign Up</button>
                </form>
                <p style="text-align: center; margin-top: 25px; font-size: 0.9rem; color: var(--text-muted);">
                    Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 600;">Login</a>
                </p>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script src="js/main.js"></script>
    <script>
        const regForm = document.getElementById('reg-form');
        const regBtn = document.getElementById('reg-btn');
        const errorEl = document.getElementById('reg-error');
        const successEl = document.getElementById('reg-success');

        regForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm-password').value;

            if (password !== confirm) {
                errorEl.innerText = 'Passwords do not match.';
                errorEl.style.display = 'block';
                return;
            }

            regBtn.disabled = true;
            regBtn.innerText = 'CREATING ACCOUNT...';

            try {
                const res = await fetch(`${apiBase}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    successEl.innerHTML = 'Registration successful! <a href="login.html" style="color: inherit; font-weight: 700; text-decoration: underline;">Login here</a>';
                    successEl.style.display = 'block';
                    regForm.reset();
                } else {
                    errorEl.innerText = data.error || 'Something went wrong.';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                console.error('Registration error:', err);
                errorEl.innerText = 'Something went wrong. Please try again.';
                errorEl.style.display = 'block';
            } finally {
                regBtn.disabled = false;
                regBtn.innerText = 'Sign Up';
            }
        });
    </script>
</body>
</html>
