<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | WHEEL COLLECTORS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="header-container"></div>

    <main class="section">
        <div class="container">
            <h2 class="section-title">Checkout</h2>
            
            <div id="checkout-container" class="cart-grid">
                <!-- Shipping Form -->
                <div class="checkout-form">
                    <div class="summary-card" style="position: static; padding: 40px; box-shadow: none;">
                        <h3 class="summary-title" style="margin-bottom: 40px;">Shipping Details</h3>
                        <form id="shipping-form">
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 25px;">
                                <div class="form-group">
                                    <label>Full Name</label>
                                    <input type="text" id="cust-name" class="premium-input" placeholder="Enter your full name" required>
                                </div>
                                <div class="form-group">
                                    <label>Phone Number</label>
                                    <input type="tel" id="cust-phone" class="premium-input" placeholder="10-digit mobile number" required>
                                </div>
                            </div>
                            <div class="form-group" style="margin-bottom: 25px;">
                                <label>Email Address</label>
                                <input type="email" id="cust-email" class="premium-input" placeholder="Where should we send your receipt?" required>
                            </div>
                            <div class="form-group" style="margin-bottom: 25px;">
                                <label>Complete Address</label>
                                <textarea id="cust-address" class="premium-input" rows="4" placeholder="House/Flat No, Apartment, Street, Landmark" required style="resize: none;"></textarea>
                            </div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 25px;">
                                <div class="form-group">
                                    <label>City</label>
                                    <input type="text" id="cust-city" class="premium-input" placeholder="City" required>
                                </div>
                                <div class="form-group">
                                    <label>State</label>
                                    <select id="cust-state" class="premium-input" required style="appearance: auto; padding-right: 10px;">
                                        <option value="" disabled selected>Select State</option>
                                        <option value="Andhra Pradesh">Andhra Pradesh</option>
                                        <option value="Arunachal Pradesh">Arunachal Pradesh</option>
                                        <option value="Assam">Assam</option>
                                        <option value="Bihar">Bihar</option>
                                        <option value="Chhattisgarh">Chhattisgarh</option>
                                        <option value="Goa">Goa</option>
                                        <option value="Gujarat">Gujarat</option>
                                        <option value="Haryana">Haryana</option>
                                        <option value="Himachal Pradesh">Himachal Pradesh</option>
                                        <option value="Jharkhand">Jharkhand</option>
                                        <option value="Karnataka">Karnataka</option>
                                        <option value="Kerala">Kerala</option>
                                        <option value="Madhya Pradesh">Madhya Pradesh</option>
                                        <option value="Maharashtra">Maharashtra</option>
                                        <option value="Manipur">Manipur</option>
                                        <option value="Meghalaya">Meghalaya</option>
                                        <option value="Mizoram">Mizoram</option>
                                        <option value="Nagaland">Nagaland</option>
                                        <option value="Odisha">Odisha</option>
                                        <option value="Punjab">Punjab</option>
                                        <option value="Rajasthan">Rajasthan</option>
                                        <option value="Sikkim">Sikkim</option>
                                        <option value="Tamil Nadu">Tamil Nadu</option>
                                        <option value="Telangana">Telangana</option>
                                        <option value="Tripura">Tripura</option>
                                        <option value="Uttar Pradesh">Uttar Pradesh</option>
                                        <option value="Uttarakhand">Uttarakhand</option>
                                        <option value="West Bengal">West Bengal</option>
                                        <option value="Andaman and Nicobar Islands">Andaman and Nicobar Islands</option>
                                        <option value="Chandigarh">Chandigarh</option>
                                        <option value="Dadra and Nagar Haveli and Daman and Diu">Dadra and Nagar Haveli and Daman and Diu</option>
                                        <option value="Delhi">Delhi</option>
                                        <option value="Jammu and Kashmir">Jammu and Kashmir</option>
                                        <option value="Ladakh">Ladakh</option>
                                        <option value="Lakshadweep">Lakshadweep</option>
                                        <option value="Puducherry">Puducherry</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Pincode</label>
                                <input type="text" id="cust-pin" class="premium-input" placeholder="6-digit PIN" required>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Order Summary -->
                <div class="order-summary">
                    <div class="summary-card">
                        <h3 class="summary-title">Your Order</h3>
                        <div id="checkout-items-list" style="margin-bottom: 30px; display: flex; flex-direction: column; gap: 15px; border-bottom: 1px dashed #e2e8f0; padding-bottom: 20px;">
                            <!-- Items via JS -->
                        </div>
                        <div class="summary-row">
                            <span style="color: var(--text-muted);">Subtotal</span>
                            <span id="summary-subtotal" style="font-weight: 700;">₹ 0</span>
                        </div>
                        <div class="summary-row">
                            <span style="color: var(--text-muted);">Shipping</span>
                            <span id="summary-shipping" style="color: #10b981; font-weight: 700;">₹ 0</span>
                        </div>
                        <div class="summary-total">
                            <span>Total</span>
                            <span style="color: var(--primary);" id="summary-total">₹ 0</span>
                        </div>
                        
                        <button id="pay-button" class="btn btn-primary" style="width: 100%; padding: 22px; font-size: 1.1rem; letter-spacing: 2px; margin-top: 40px; box-shadow: 0 10px 20px rgba(223, 22, 35, 0.2);">
                            PLACE ORDER & PAY
                        </button>
                        
                        <div style="text-align: center; color: var(--text-muted); font-size: 11px; margin-top: 25px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 10px;">
                            <img src="https://img.icons8.com/color/48/razorpay.png" style="width: 16px; height: 16px;">
                            Secure Payment by Razorpay
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="js/main.js"></script>
    <script>
        let orderTotal = 0;
        let cartItems = [];

        async function initCheckout() {
            const cart = getCart();
            const ids = Object.keys(cart);
            
            if (ids.length === 0) {
                window.location.href = 'cart.html';
                return;
            }

            try {
                const res = await fetch(`${apiBase}/products?ids=${ids.join(',')}`);
                const products = await res.json();
                
                const list = document.getElementById('checkout-items-list');
                let total = 0;
                cartItems = [];

                list.innerHTML = products.map(p => {
                    const qty = cart[p.id];
                    const subtotal = p.price * qty;
                    total += subtotal;
                    
                    cartItems.push({ productId: p.id, quantity: qty, price: p.price });

                    return `
                        <div style="display: flex; justify-content: space-between; align-items: center; font-size: 14px;">
                            <div style="display: flex; gap: 15px; align-items: center;">
                                <div style="width: 50px; height: 50px; background: #fff; border: 1px solid #f1f5f9; border-radius: 6px; overflow: hidden; padding: 5px;">
                                    <img src="${p.image_url}" style="width: 100%; height: 100%; object-fit: contain;">
                                </div>
                                <div style="display: flex; flex-direction: column;">
                                    <span style="font-weight: 700; color: #1a1a1a; font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 0.5px;">${p.name}</span>
                                    <span style="color: var(--text-muted); font-size: 11px; font-weight: 600;">QTY: ${qty}</span>
                                </div>
                            </div>
                            <span style="font-weight: 700; color: var(--text-dark);">₹${subtotal.toLocaleString()}</span>
                        </div>`;
                }).join('');

                orderTotal = total;
                document.getElementById('summary-subtotal').innerText = `₹ ${orderTotal.toLocaleString()}`;
                updateShipping();
                
            } catch (err) {
                console.error('Error loading checkout:', err);
            }
        }

        function updateShipping() {
            const state = document.getElementById('cust-state').value;
            let shipping = 0;

            if (orderTotal < 500 && state) {
                const kerala = ['Kerala'];
                const middleIndia = ['Tamil Nadu', 'Karnataka', 'Andhra Pradesh', 'Telangana', 'Maharashtra', 'Goa', 'Puducherry', 'Lakshadweep', 'Odisha', 'Gujarat', 'Chhattisgarh'];
                
                if (kerala.includes(state)) {
                    shipping = 50;
                } else if (middleIndia.includes(state)) {
                    shipping = 70;
                } else {
                    shipping = 80;
                }
            }

            const shippingEl = document.getElementById('summary-shipping');
            if (shipping === 0) {
                shippingEl.innerText = 'FREE';
                shippingEl.style.color = '#10b981';
            } else {
                shippingEl.innerText = `₹ ${shipping}`;
                shippingEl.style.color = 'var(--text-dark)';
            }

            const grandTotal = orderTotal + shipping;
            document.getElementById('summary-total').innerText = `₹ ${grandTotal.toLocaleString()}`;
            return shipping;
        }

        document.getElementById('cust-state').addEventListener('change', updateShipping);

        document.getElementById('pay-button').addEventListener('click', async () => {
            const form = document.getElementById('shipping-form');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const btn = document.getElementById('pay-button');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> SECURING PAYMENT...';

            const custName = document.getElementById('cust-name').value;
            const custEmail = document.getElementById('cust-email').value;
            const custPhone = document.getElementById('cust-phone').value;
            const fullAddress = `${document.getElementById('cust-address').value}, ${document.getElementById('cust-city').value} - ${document.getElementById('cust-pin').value} | Phone: ${custPhone}`;

            try {
                // 1. Create order in our D1 database first
                const orderRes = await fetch(`${apiBase}/orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        items: cartItems,
                        customer_name: custName,
                        customer_email: custEmail,
                        customer_phone: custPhone,
                        city: document.getElementById('cust-city').value,
                        state: document.getElementById('cust-state').value,
                        pincode: document.getElementById('cust-pin').value,
                        address: fullAddress, // Kept for safety/legacy
                        userId: null
                    })
                });
                const orderResult = await orderRes.json();
                if (!orderResult.success) throw new Error('Order creation failed');

                const internalOrderId = orderResult.orderId;

                // 2. Create Razorpay order via our backend
                const rzRes = await fetch(`${apiBase}/payments/create-order`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        amount: orderTotal + updateShipping(),
                        orderId: internalOrderId
                    })
                });
                const rzData = await rzRes.json();
                if (rzData.error) throw new Error(rzData.error);

                // 3. Open Razorpay Checkout
                const options = {
                    "key": "rzp_live_SS08BJzv05lh7z", // LIVE RAZORPAY KEY ID
                    "amount": rzData.amount,
                    "currency": "INR",
                    "name": "WheelCollectors",
                    "description": "Order #" + internalOrderId,
                    "order_id": rzData.id,
                    "handler": async function (response) {
                        // After successful payment
                        const verifyRes = await fetch(`${apiBase}/payments/verify`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                razorpay_order_id: response.razorpay_order_id,
                                razorpay_payment_id: response.razorpay_payment_id,
                                razorpay_signature: response.razorpay_signature,
                                internal_order_id: internalOrderId,
                                verify_signature: true
                            })
                        });
                        const verifyResult = await verifyRes.json();
                        if (verifyResult.success) {
                            saveCart({}); // Clear cart
                            window.location.href = `success.html?orderId=${internalOrderId}`;
                        } else {
                            alert("Payment verification failed. Please contact support.");
                        }
                    },
                    "prefill": {
                        "name": custName,
                        "email": custEmail,
                        "contact": custPhone
                    },
                    "theme": { "color": "#fb641b" }
                };
                
                const rzp = new Razorpay(options);
                rzp.open();

            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'PLACE ORDER & PAY';
            }
        });

        document.addEventListener('DOMContentLoaded', initCheckout);
    </script>
</body>
</html>
