<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | WHEEL COLLECTORS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="header-container"></div>

    <main class="section">
        <div class="container" id="cart-page-content">
            <h2 class="section-title">Your Cart</h2>
            
            <div id="cart-loading" style="text-align: center; padding: 100px 0;">
                <i class="fa fa-spinner fa-spin" style="font-size: 3rem; color: var(--primary);"></i>
                <p style="margin-top: 20px; font-weight: 500; letter-spacing: 1px;">PREPARING YOUR TREASURES...</p>
            </div>

            <div id="cart-empty" style="display: none;" class="feature-card">
                <div style="padding: 100px 20px; text-align: center;">
                    <div style="width: 100px; height: 100px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px;">
                        <i class="fa-solid fa-cart-shopping" style="font-size: 2.5rem; color: var(--text-muted);"></i>
                    </div>
                    <h3 style="font-size: 1.5rem; margin-bottom: 15px;">Your cart is empty</h3>
                    <p style="color: var(--text-muted); margin-bottom: 40px; max-width: 400px; margin-left: auto; margin-right: auto;">Looks like you haven't added any diecast collectibles to your vault yet.</p>
                    <a href="shop.html" class="btn btn-primary" style="padding: 18px 40px; font-size: 1rem;">Back to Store</a>
                </div>
            </div>

            <div id="cart-filled" style="display: none;" class="cart-grid">
                <div class="cart-items" id="cart-items-list" style="background: white; border: 1px solid #e2e8f0; border-radius: 4px; overflow: hidden;">
                    <!-- Loaded via JS -->
                </div>
                
                <div class="cart-summary">
                    <div class="summary-card">
                        <h3 class="summary-title">Order Summary</h3>
                        <div class="summary-row">
                            <span style="color: var(--text-muted);">Subtotal</span>
                            <span id="cart-subtotal" style="font-weight: 700;">₹ 0</span>
                        </div>
                        <div class="summary-row">
                            <span style="color: var(--text-muted);">Shipping</span>
                            <span style="color: #10b981; font-weight: 700;">FREE</span>
                        </div>
                        <div class="summary-total">
                            <span>Total</span>
                            <span style="color: var(--primary);" id="cart-total">₹ 0</span>
                        </div>
                        <a href="checkout.html" class="btn btn-primary desktop-checkout-btn" style="width: 100%; display: block; text-align: center; margin-top: 40px; padding: 22px; font-size: 1.1rem; letter-spacing: 2px;">PROCEED TO CHECKOUT</a>
                        
                        <div style="margin-top: 30px; display: flex; align-items: center; justify-content: center; gap: 15px; font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">
                            <i class="fa-solid fa-shield-check" style="color: #10b981;"></i>
                            Secure Checkout
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Mobile Sticky Footer -->
    <div class="mobile-sticky-footer" id="mobile-summary-bar">
        <div style="display: flex; flex-direction: column;">
            <span style="font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Total Amount</span>
            <span id="mobile-cart-total" style="font-size: 1.4rem; font-weight: 800; color: var(--text-dark); font-family: 'Oswald', sans-serif;">₹ 0</span>
        </div>
        <a href="checkout.html" class="btn btn-primary" style="padding: 15px 30px; font-size: 0.9rem; letter-spacing: 1px;">CHECKOUT</a>
    </div>

    <div id="footer-container"></div>

    <script src="js/main.js"></script>
    <script>
        async function loadCartPage() {
            const cart = getCart();
            const ids = Object.keys(cart);
            
            if (ids.length === 0) {
                document.getElementById('cart-loading').style.display = 'none';
                document.getElementById('cart-empty').style.display = 'block';
                document.getElementById('mobile-summary-bar').style.display = 'none';
                return;
            }

            try {
                const res = await fetch(`${apiBase}/products?ids=${ids.join(',')}`);
                const products = await res.json();
                
                const list = document.getElementById('cart-items-list');
                let total = 0;

                list.innerHTML = products.map(p => {
                    const qty = cart[p.id];
                    const subtotal = p.price * qty;
                    total += subtotal;
                    
                    return `
                        <div class="cart-item-card">
                            <div class="cart-item-image">
                                <img src="${p.image_url}" alt="${p.name}">
                            </div>
                            <div class="cart-item-details">
                                <h3 class="cart-product-title">${p.name}</h3>
                                <div class="cart-product-meta">
                                    <span class="cart-subtitle">${p.subtitle || 'Collector Series'}</span>
                                </div>
                                <div style="font-weight: 700; color: var(--primary); font-size: 1.1rem; margin-top: 8px;">₹${Number(p.price).toLocaleString()}</div>
                                <div class="cart-actions-row">
                                    <div class="qty-control" style="border: 1px solid #e2e8f0; border-radius: 4px; overflow: hidden; display: flex; align-items: center;">
                                        <button class="qty-btn" onclick="updateCartQty(${p.id}, ${qty - 1})" style="width: 32px; height: 32px; border: none; background: #f8fafc; cursor: pointer; font-weight: bold;">-</button>
                                        <div class="qty-input" style="width: 40px; text-align: center; font-weight: 700; font-size: 14px;">${qty}</div>
                                        <button class="qty-btn" onclick="updateCartQty(${p.id}, ${qty + 1})" style="width: 32px; height: 32px; border: none; background: #f8fafc; cursor: pointer; font-weight: bold;">+</button>
                                    </div>
                                    <button class="remove-btn" onclick="removeFromCart(${p.id})" style="background: none; border: none; color: #94a3b8; font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 13px; letter-spacing: 1px; cursor: pointer; transition: color 0.3s;">
                                        <i class="fa-solid fa-trash-can" style="margin-right: 5px;"></i> REMOVE
                                    </button>
                                </div>
                            </div>
                        </div>`;
                }).join('');

                const formattedTotal = `₹ ${total.toLocaleString()}`;
                document.getElementById('cart-subtotal').innerText = formattedTotal;
                document.getElementById('cart-total').innerText = formattedTotal;
                document.getElementById('mobile-cart-total').innerText = formattedTotal;
                
                document.getElementById('cart-loading').style.display = 'none';
                document.getElementById('cart-filled').style.display = 'grid';

            } catch (err) {
                console.error('Error loading cart details:', err);
                document.getElementById('cart-loading').innerHTML = '<p>Error loading cart. Please refresh.</p>';
            }
        }

        function updateCartQty(id, newQty) {
            if (newQty < 1) return;
            const cart = getCart();
            cart[id] = newQty;
            saveCart(cart);
            loadCartPage();
        }

        function removeFromCart(id) {
            const cart = getCart();
            delete cart[id];
            saveCart(cart);
            loadCartPage();
        }

        document.addEventListener('DOMContentLoaded', loadCartPage);
    </script>
</body>
</html>
