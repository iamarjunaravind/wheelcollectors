<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | WHEEL COLLECTORS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="header-container"></div>

    <main class="section">
        <div class="container" id="cart-page-content">
            <h2 class="section-title">Shopping Cart</h2>
            <div id="cart-loading" style="text-align: center; padding: 50px;">
                <i class="fa fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary);"></i>
                <p>Loading your treasures...</p>
            </div>
            <div id="cart-empty" style="display: none;" class="feature-card">
                <div style="padding: 60px; text-align: center;">
                    <i class="fa-solid fa-cart-shopping" style="font-size: 4rem; color: var(--text-muted); margin-bottom: 20px;"></i>
                    <p style="font-size: 1.2rem; margin-bottom: 30px;">Your cart is empty.</p>
                    <a href="shop.html" class="btn btn-primary">Start Shopping</a>
                </div>
            </div>
            <div id="cart-filled" style="display: none;" class="cart-grid">
                <div class="cart-items" id="cart-items-list">
                    <!-- Loaded via JS -->
                </div>
                <div class="cart-summary">
                    <div class="feature-card" style="padding: 30px;">
                        <h3 style="font-size: 1.2rem; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;">Order Summary</h3>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                            <span style="color: var(--text-muted);">Subtotal</span>
                            <span id="cart-subtotal">₹ 0</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                            <span style="color: var(--text-muted);">Shipping</span>
                            <span style="color: #10b981;">FREE</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-top: 25px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); font-weight: 800; font-size: 1.3rem;">
                            <span>Total</span>
                            <span style="color: var(--primary);" id="cart-total">₹ 0</span>
                        </div>
                        <a href="checkout.html" class="btn btn-primary desktop-checkout-btn" style="width: 100%; display: block; text-align: center; margin-top: 30px; padding: 18px;">Proceed to Checkout</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script src="js/main.js"></script>
    <script>
        async function loadCartPage() {
            const cart = getCart();
            const ids = Object.keys(cart);
            
            if (ids.length === 0) {
                document.getElementById('cart-loading').style.display = 'none';
                document.getElementById('cart-empty').style.display = 'block';
                return;
            }

            try {
                const res = await fetch(`${apiBase}/products?ids=${ids.join(',')}`);
                const products = await res.json();
                
                const list = document.getElementById('cart-items-list');
                let total = 0;

                list.innerHTML = products.map(p => {
                    const qty = cart[p.id];
                    const subtotal = p.price * qty;
                    total += subtotal;
                    
                    return `
                        <div class="cart-item-card">
                            <div class="cart-item-image">
                                <img src="${p.image_url}" alt="${p.name}">
                            </div>
                            <div class="cart-item-details">
                                <h3 class="cart-product-title">${p.name}</h3>
                                <div class="cart-product-meta">
                                    <span class="cart-subtitle">${p.subtitle || ''}</span>
                                </div>
                                <div class="cart-pricing-row">
                                    <span class="current-price">₹${Number(p.price).toLocaleString()}</span>
                                </div>
                                <div class="cart-actions-row">
                                    <div class="qty-control">
                                        <button class="qty-btn ${qty <= 1 ? 'disabled' : ''}" onclick="updateCartQty(${p.id}, ${qty - 1})">-</button>
                                        <div class="qty-input">${qty}</div>
                                        <button class="qty-btn" onclick="updateCartQty(${p.id}, ${qty + 1})">+</button>
                                    </div>
                                    <button class="remove-btn" onclick="removeFromCart(${p.id})">REMOVE</button>
                                </div>
                            </div>
                        </div>`;
                }).join('');

                document.getElementById('cart-subtotal').innerText = `₹ ${total.toLocaleString()}`;
                document.getElementById('cart-total').innerText = `₹ ${total.toLocaleString()}`;
                
                document.getElementById('cart-loading').style.display = 'none';
                document.getElementById('cart-filled').style.display = 'grid';

            } catch (err) {
                console.error('Error loading cart details:', err);
                document.getElementById('cart-loading').innerHTML = '<p>Error loading cart. Please refresh.</p>';
            }
        }

        function updateCartQty(id, newQty) {
            if (newQty < 1) return;
            const cart = getCart();
            cart[id] = newQty;
            saveCart(cart);
            loadCartPage();
        }

        function removeFromCart(id) {
            const cart = getCart();
            delete cart[id];
            saveCart(cart);
            loadCartPage();
        }

        document.addEventListener('DOMContentLoaded', loadCartPage);
    </script>
</body>
</html>
